spring.application.name=vnkapp

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Application name (used in emails)
app.name=VNK App

# Session configuration
# Session token expiry time in hours (default: 24 hours)
app.session.expiry-hours=24

# Password reset configuration
# Reset code expiry time in minutes (default: 15 minutes)
app.password-reset.expiry-minutes=15

# Email configuration (Gmail SMTP example)
# Replace with your actual SMTP credentials
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
