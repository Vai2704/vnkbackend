# Local development (docker compose). Activate with SPRING_PROFILES_ACTIVE=local
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vnkApp
    username: postgres
    password: root
  jpa:
    show-sql: true
  # spring.mail.username / spring.mail.password come from the SPRING_MAIL_USERNAME /
  # SPRING_MAIL_PASSWORD env vars (see .env.example) — never hardcode real credentials here.
