spring:
  application:
    name: vnkapp
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  # mail:
  #   host: smtp.gmail.com
  #   port: 587
  #   properties:
  #     mail:
  #       smtp:
  #         auth: true
  #         starttls:
  #           enable: true
  #           required: true
  # ^ commented out until SPRING_MAIL_USERNAME/PASSWORD app-password creds are available.
  # EmailService is @ConditionalOnProperty(spring.mail.host), so with this block absent
  # the bean simply won't be created — UserService/OrderService already inject it as
  # Optional<EmailService> so nothing else breaks.

app:
  name: VNK App
  password-reset:
    expiry-minutes: 15
